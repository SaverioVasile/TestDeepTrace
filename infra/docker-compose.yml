services:
  postgres:
    image: postgres:16-alpine
    container_name: faq-postgres
    environment:
      POSTGRES_DB: faqdb
      POSTGRES_USER: faq
      POSTGRES_PASSWORD: faq
    ports:
      - "5432:5432"
    volumes:
      - faq_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faq -d faqdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: faq-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/faqdb
      SPRING_DATASOURCE_USERNAME: faq
      SPRING_DATASOURCE_PASSWORD: faq
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_PROVIDER: ${APP_MAIL_PROVIDER:-smtp}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@example.com}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-email-smtp.eu-west-1.amazonaws.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      APP_MAIL_SES_REGION: ${APP_MAIL_SES_REGION:-eu-west-1}
      APP_MAIL_SES_ACCESS_KEY: ${APP_MAIL_SES_ACCESS_KEY:-}
      APP_MAIL_SES_SECRET_KEY: ${APP_MAIL_SES_SECRET_KEY:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
    container_name: faq-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"

volumes:
  faq_pg_data:

