spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    host: ${SPRING_MAIL_HOST:email-smtp.eu-west-1.amazonaws.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  db:
    provider: ${APP_DB_PROVIDER:local}
    local:
      url: ${APP_DB_LOCAL_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/faqdb}}
      username: ${APP_DB_LOCAL_USERNAME:${SPRING_DATASOURCE_USERNAME:faq}}
      password: ${APP_DB_LOCAL_PASSWORD:${SPRING_DATASOURCE_PASSWORD:faq}}
    rds:
      url: ${APP_DB_RDS_URL:}
      username: ${APP_DB_RDS_USERNAME:}
      password: ${APP_DB_RDS_PASSWORD:}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    provider: ${APP_MAIL_PROVIDER:smtp}
    from: ${APP_MAIL_FROM:no-reply@example.com}
    ses:
      region: ${APP_MAIL_SES_REGION:eu-west-1}
      access-key: ${APP_MAIL_SES_ACCESS_KEY:}
      secret-key: ${APP_MAIL_SES_SECRET_KEY:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

